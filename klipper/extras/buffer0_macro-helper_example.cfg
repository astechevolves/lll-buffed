#####################################################################
#                  LLL-Buffed BufferN via CP2112
#####################################################################
# Purpose:
# - Wrap the Python CP2112 helper in Klipper macro commands.
# - Keep BufferN address/config centralized for future multi-buffer expansion.
# - Expose all current lll-buffed firmware tools through named Klipper macros.
#
# bufferN conversion notes:
# - Change every macro suffix _0 to the target buffer number.
# - Change _LLL_BUFFER_VARS_0 to _LLL_BUFFER_VARS_N.
# - Change variable_addr to the flashed 7-bit I2C address for that buffer.
# - Change any BUFFER_*_0 command calls to the matching BUFFER_*_N calls.
#
# Known behavior:
# - AUTO/REGULAR/NORMAL returns control to native hall-sensor logic.
# - AUTO does not guarantee immediate motion until a hall sensor changes.
# - MOVE_DIST performs accurate firmware-bounded moves.
# - MOVE_DIST leaves the buffer outside native auto logic until AUTO is sent.
# - PUSH/PULL are modal forced-motion commands and ignore hall sensors while active.
# - OFF/DISABLE momentarily disables motor output, but firmware can re-enable on state changes.
# - TIMEOUT / HOLD_TIMEOUT / HOLD_TIMEOUT_ENABLE are firmware settings.
#####################################################################


#####################################################################
#                  BufferN Shared Variables
#####################################################################
# Purpose:
# - Central storage for BufferN address, firmware session defaults,
#   and wrapper safety limits.
# - BUFFER_APPLY_DEFAULTS_N reads these values directly so this macro
#   remains the single source of truth for BufferN firmware behavior.
#####################################################################

# bufferN - Change _0 to the target buffer number.
[gcode_macro _LLL_BUFFER_VARS_0]
description: Shared settings for LLL-Buffed CP2112 buffer control

# bufferN - Change this to the flashed 7-bit I2C address for the target buffer.
variable_addr: "0x10"

# Firmware session defaults.
# lll-buffed stores these in RAM, so BUFFER_APPLY_DEFAULTS_N reapplies them
# after buffer power cycle/reboot.
variable_default_speed: 45.0                  # Firmware move speed used by MOVE_DIST and native buffer behavior.
variable_default_timeout_ms: 60000            # REGULAR/AUTO timeout to avoid feed attempts running forever.
variable_default_emptying_timeout_ms: 2500    # No-filament/emptying behavior timeout.
variable_default_hold_timeout_ms: 10000       # Hold power-save delay.
variable_default_hold_timeout_enable: 1       # 1 = enable hold power-save after HOLD_TIMEOUT.
variable_default_multi_press_count: 2         # Physical button presses needed for continuous mode.

# Wrapper movement limits.
variable_max_speed: 80.0                      # Wrapper safety cap for firmware speed commands.
variable_max_move_distance: 2000.0            # Allows long unload pulls while blocking accidental huge moves.
variable_move_settle_ms: 250                  # Extra dwell added after WAIT=1 moves.

# Firmware setting guardrails.
# These are limits only. The actual defaults above are what get applied.
variable_min_timeout_ms: 1000                 # Minimum regular/continuous timeout allowed by wrapper.
variable_max_timeout_ms: 300000               # Maximum regular/continuous timeout allowed by wrapper.
variable_min_emptying_timeout_ms: 500         # Minimum no-filament emptying timeout allowed by wrapper.
variable_max_emptying_timeout_ms: 60000       # Maximum no-filament emptying timeout allowed by wrapper.
variable_min_hold_timeout_ms: 1000            # Minimum hold power-save timeout allowed by wrapper.
variable_max_hold_timeout_ms: 60000           # Maximum hold power-save timeout allowed by wrapper.
variable_min_multi_press_count: 2             # Avoid disabling useful physical button behavior by accident.
variable_max_multi_press_count: 10            # Keep physical button behavior sane.
gcode:
    # Storage macro only. Do not call directly.


#####################################################################
#                  BufferN Apply Firmware Defaults
#####################################################################
# Purpose:
# - Reapply lll-buffed RAM-only settings after buffer power cycle/reboot.
# - Pulls values from _LLL_BUFFER_VARS_N so BufferN has one source of truth.
# - Use this after Klipper restart, before testing, or before load/unload logic.
#####################################################################

# bufferN - Change _0 to the target buffer number.
[gcode_macro BUFFER_APPLY_DEFAULTS_0]
description: Apply preferred lll-buffed firmware defaults to buffer
gcode:
    # bufferN - Change _LLL_BUFFER_VARS_0 to the matching vars macro.
    {% set v = printer["gcode_macro _LLL_BUFFER_VARS_0"] %}
    {% set read_status = params.READ_STATUS|default(0)|int %}

    # bufferN - Change BUFFER_SET_SPEED_0 to the matching buffer macro.
    BUFFER_SET_SPEED_0 SPEED={v.default_speed}

    # bufferN - Change BUFFER_SET_TIMEOUT_0 to the matching buffer macro.
    BUFFER_SET_TIMEOUT_0 TIMEOUT_MS={v.default_timeout_ms}

    # bufferN - Change BUFFER_SET_EMPTYING_TIMEOUT_0 to the matching buffer macro.
    BUFFER_SET_EMPTYING_TIMEOUT_0 TIMEOUT_MS={v.default_emptying_timeout_ms}

    # bufferN - Change BUFFER_SET_HOLD_TIMEOUT_0 to the matching buffer macro.
    BUFFER_SET_HOLD_TIMEOUT_0 TIMEOUT_MS={v.default_hold_timeout_ms}

    # bufferN - Change BUFFER_SET_HOLD_TIMEOUT_ENABLE_0 to the matching buffer macro.
    BUFFER_SET_HOLD_TIMEOUT_ENABLE_0 ENABLE={v.default_hold_timeout_enable}

    # bufferN - Change BUFFER_SET_MULTI_PRESS_0 to the matching buffer macro.
    BUFFER_SET_MULTI_PRESS_0 COUNT={v.default_multi_press_count}

    {% if read_status %}
        # bufferN - Change BUFFER_STATUS_0 to the matching buffer macro.
        BUFFER_STATUS_0
    {% endif %}


#####################################################################
#                  BufferN Status
#####################################################################
# Purpose:
# - Read live buffer state and firmware settings.
# - Uses the verbose shell command so output is visible in Mainsail console.
#####################################################################

# bufferN - Change _0 to the target buffer number.
[gcode_macro BUFFER_STATUS_0]
description: Read lll-buffed buffer status through CP2112
gcode:
    # bufferN - Change _LLL_BUFFER_VARS_0 to the matching vars macro.
    {% set vars = printer["gcode_macro _LLL_BUFFER_VARS_0"] %}

    # This reports:
    # status, filament_present, timed_out, mode, motor, speed,
    # timeout, emptying_timeout, hold_timeout, hold_timeout_en, and multi_press.
    RUN_SHELL_COMMAND CMD=lll_buffer_cp2112_verbose PARAMS="--addr {vars.addr} status"


#####################################################################
#                  BufferN Native AUTO / REGULAR Mode
#####################################################################
# Purpose:
# - Return BufferN to native lll-buffed hall-sensor logic.
# - Use this intentionally during load, print prep, or reload windows.
#####################################################################

# bufferN - Change _0 to the target buffer number.
[gcode_macro BUFFER_AUTO_0]
description: Return lll-buffed buffer to native automatic sensor logic
gcode:
    # bufferN - Change _LLL_BUFFER_VARS_0 to the matching vars macro.
    {% set vars = printer["gcode_macro _LLL_BUFFER_VARS_0"] %}

    # AUTO hands control back to firmware hall-sensor logic.
    # It is not an immediate feed command.
    RUN_SHELL_COMMAND CMD=lll_buffer_cp2112 PARAMS="--addr {vars.addr} auto"


# bufferN - Change _0 to the target buffer number.
[gcode_macro BUFFER_NORMAL_0]
description: Alias for BUFFER_AUTO_N
gcode:
    # bufferN - Change BUFFER_AUTO_0 to the matching buffer macro.
    BUFFER_AUTO_0


#####################################################################
#                  BufferN OFF / DISABLE
#####################################################################
# Purpose:
# - Momentarily disable motor output.
# - This is not a guaranteed latched idle state because firmware can re-enable
#   motor output later if native sensor logic wakes it.
#####################################################################

# bufferN - Change _0 to the target buffer number.
[gcode_macro BUFFER_OFF_0]
description: Momentarily disable lll-buffed buffer motor output
gcode:
    # bufferN - Change _LLL_BUFFER_VARS_0 to the matching vars macro.
    {% set vars = printer["gcode_macro _LLL_BUFFER_VARS_0"] %}

    # OFF/DISABLE turns off motor output at this moment.
    # Firmware may re-enable motor later if sensor state changes.
    RUN_SHELL_COMMAND CMD=lll_buffer_cp2112 PARAMS="--addr {vars.addr} off"


# bufferN - Change _0 to the target buffer number.
[gcode_macro BUFFER_DISABLE_0]
description: Alias for BUFFER_OFF_N
gcode:
    # bufferN - Change BUFFER_OFF_0 to the matching buffer macro.
    BUFFER_OFF_0


#####################################################################
#                  BufferN MANUAL / HOLD
#####################################################################
# Purpose:
# - Put BufferN into manual/hold mode.
# - This ignores normal hall-sensor auto behavior.
# - Useful for testing and possible idle/reload experiments.
#####################################################################

# bufferN - Change _0 to the target buffer number.
[gcode_macro BUFFER_MANUAL_0]
description: Put lll-buffed buffer into manual/hold mode
gcode:
    # bufferN - Change _LLL_BUFFER_VARS_0 to the matching vars macro.
    {% set vars = printer["gcode_macro _LLL_BUFFER_VARS_0"] %}

    # MANUAL/HOLD ignores normal hall-sensor logic.
    RUN_SHELL_COMMAND CMD=lll_buffer_cp2112 PARAMS="--addr {vars.addr} manual"


# bufferN - Change _0 to the target buffer number.
[gcode_macro BUFFER_HOLD_0]
description: Alias for BUFFER_MANUAL_N
gcode:
    # bufferN - Change BUFFER_MANUAL_0 to the matching buffer macro.
    BUFFER_MANUAL_0


#####################################################################
#                  BufferN Firmware Speed
#####################################################################
# Purpose:
# - Set the lll-buffed firmware movement speed.
# - This is the speed used by firmware moves, not a Klipper live velocity override.
#####################################################################

# bufferN - Change _0 to the target buffer number.
[gcode_macro BUFFER_SET_SPEED_0]
description: Set lll-buffed buffer firmware motion speed
gcode:
    # bufferN - Change _LLL_BUFFER_VARS_0 to the matching vars macro.
    {% set vars = printer["gcode_macro _LLL_BUFFER_VARS_0"] %}
    {% set speed = params.SPEED|default(vars.default_speed)|float %}

    {% if speed <= 0 %}
        # bufferN - Change BUFFER_SET_SPEED_0 in this message to the matching macro number.
        {action_raise_error("BUFFER_SET_SPEED_0 SPEED must be greater than 0")}
    {% endif %}

    {% if speed > vars.max_speed|float %}
        # bufferN - Change BUFFER_SET_SPEED_0 in this message to the matching macro number.
        {action_raise_error("BUFFER_SET_SPEED_0 SPEED exceeds max_speed")}
    {% endif %}

    # Speed is configured firmware move speed, not live motor velocity.
    RUN_SHELL_COMMAND CMD=lll_buffer_cp2112 PARAMS="--addr {vars.addr} speed --speed {speed}"


#####################################################################
#                  BufferN Firmware TIMEOUT
#####################################################################
# Purpose:
# - Set the regular/continuous mode timeout.
# - This is the setting for preventing AUTO/REGULAR from feeding forever
#   when the buffer does not see valid sensor/user progress.
#####################################################################

# bufferN - Change _0 to the target buffer number.
[gcode_macro BUFFER_SET_TIMEOUT_0]
description: Set lll-buffed buffer regular/continuous mode timeout in milliseconds
gcode:
    # bufferN - Change _LLL_BUFFER_VARS_0 to the matching vars macro.
    {% set vars = printer["gcode_macro _LLL_BUFFER_VARS_0"] %}
    {% set timeout_ms = params.TIMEOUT_MS|default(-1)|int %}

    {% if timeout_ms < vars.min_timeout_ms|int %}
        # bufferN - Change BUFFER_SET_TIMEOUT_0 in this message to the matching macro number.
        {action_raise_error("BUFFER_SET_TIMEOUT_0 TIMEOUT_MS is below min_timeout_ms")}
    {% endif %}

    {% if timeout_ms > vars.max_timeout_ms|int %}
        # bufferN - Change BUFFER_SET_TIMEOUT_0 in this message to the matching macro number.
        {action_raise_error("BUFFER_SET_TIMEOUT_0 TIMEOUT_MS exceeds max_timeout_ms")}
    {% endif %}

    # TIMEOUT limits regular/continuous motion if no user/sensor input resets the firmware timer.
    RUN_SHELL_COMMAND CMD=lll_buffer_cp2112 PARAMS="--addr {vars.addr} timeout --timeout-ms {timeout_ms}"


#####################################################################
#                  BufferN Firmware EMPTYING_TIMEOUT
#####################################################################
# Purpose:
# - Set the timeout used when firmware is emptying/no-filament handling.
# - Exposed for completeness; test before relying on it in unload behavior.
#####################################################################

# bufferN - Change _0 to the target buffer number.
[gcode_macro BUFFER_SET_EMPTYING_TIMEOUT_0]
description: Set lll-buffed buffer emptying timeout in milliseconds
gcode:
    # bufferN - Change _LLL_BUFFER_VARS_0 to the matching vars macro.
    {% set vars = printer["gcode_macro _LLL_BUFFER_VARS_0"] %}
    {% set timeout_ms = params.TIMEOUT_MS|default(-1)|int %}

    {% if timeout_ms < vars.min_emptying_timeout_ms|int %}
        # bufferN - Change BUFFER_SET_EMPTYING_TIMEOUT_0 in this message to the matching macro number.
        {action_raise_error("BUFFER_SET_EMPTYING_TIMEOUT_0 TIMEOUT_MS is below min_emptying_timeout_ms")}
    {% endif %}

    {% if timeout_ms > vars.max_emptying_timeout_ms|int %}
        # bufferN - Change BUFFER_SET_EMPTYING_TIMEOUT_0 in this message to the matching macro number.
        {action_raise_error("BUFFER_SET_EMPTYING_TIMEOUT_0 TIMEOUT_MS exceeds max_emptying_timeout_ms")}
    {% endif %}

    # EMPTYING_TIMEOUT controls timeout behavior when no filament is detected.
    RUN_SHELL_COMMAND CMD=lll_buffer_cp2112 PARAMS="--addr {vars.addr} emptying-timeout --emptying-timeout-ms {timeout_ms}"


#####################################################################
#                  BufferN Firmware HOLD_TIMEOUT
#####################################################################
# Purpose:
# - Set how long HOLD can keep motor output energized before power-save.
# - Requires HOLD_TIMEOUT_ENABLE=1.
#####################################################################

# bufferN - Change _0 to the target buffer number.
[gcode_macro BUFFER_SET_HOLD_TIMEOUT_0]
description: Set lll-buffed buffer hold power-save timeout in milliseconds
gcode:
    # bufferN - Change _LLL_BUFFER_VARS_0 to the matching vars macro.
    {% set vars = printer["gcode_macro _LLL_BUFFER_VARS_0"] %}
    {% set timeout_ms = params.TIMEOUT_MS|default(-1)|int %}

    {% if timeout_ms < vars.min_hold_timeout_ms|int %}
        # bufferN - Change BUFFER_SET_HOLD_TIMEOUT_0 in this message to the matching macro number.
        {action_raise_error("BUFFER_SET_HOLD_TIMEOUT_0 TIMEOUT_MS is below min_hold_timeout_ms")}
    {% endif %}

    {% if timeout_ms > vars.max_hold_timeout_ms|int %}
        # bufferN - Change BUFFER_SET_HOLD_TIMEOUT_0 in this message to the matching macro number.
        {action_raise_error("BUFFER_SET_HOLD_TIMEOUT_0 TIMEOUT_MS exceeds max_hold_timeout_ms")}
    {% endif %}

    # HOLD_TIMEOUT controls how long hold/idle can keep the motor energized before power-save.
    RUN_SHELL_COMMAND CMD=lll_buffer_cp2112 PARAMS="--addr {vars.addr} hold-timeout --hold-timeout-ms {timeout_ms}"


#####################################################################
#                  BufferN Firmware HOLD_TIMEOUT_ENABLE
#####################################################################
# Purpose:
# - Enable or disable hold power-save behavior.
# - Without this enabled, HOLD_TIMEOUT may be visible in status but not active.
#####################################################################

# bufferN - Change _0 to the target buffer number.
[gcode_macro BUFFER_SET_HOLD_TIMEOUT_ENABLE_0]
description: Enable or disable lll-buffed buffer hold timeout power-save mode
gcode:
    # bufferN - Change _LLL_BUFFER_VARS_0 to the matching vars macro.
    {% set vars = printer["gcode_macro _LLL_BUFFER_VARS_0"] %}
    {% set enable = params.ENABLE|default(-1)|int %}

    {% if enable not in [0, 1] %}
        # bufferN - Change BUFFER_SET_HOLD_TIMEOUT_ENABLE_0 in this message to the matching macro number.
        {action_raise_error("BUFFER_SET_HOLD_TIMEOUT_ENABLE_0 ENABLE must be 0 or 1")}
    {% endif %}

    # HOLD_TIMEOUT_EN enables firmware power-save after the configured hold timeout.
    RUN_SHELL_COMMAND CMD=lll_buffer_cp2112 PARAMS="--addr {vars.addr} hold-timeout-enable --hold-timeout-enable {enable}"


#####################################################################
#                  BufferN Firmware MULTI_PRESS
#####################################################################
# Purpose:
# - Set how many physical button presses enter continuous mode.
#####################################################################

# bufferN - Change _0 to the target buffer number.
[gcode_macro BUFFER_SET_MULTI_PRESS_0]
description: Set lll-buffed buffer physical button multi-press count
gcode:
    # bufferN - Change _LLL_BUFFER_VARS_0 to the matching vars macro.
    {% set vars = printer["gcode_macro _LLL_BUFFER_VARS_0"] %}
    {% set count = params.COUNT|default(-1)|int %}

    {% if count < vars.min_multi_press_count|int %}
        # bufferN - Change BUFFER_SET_MULTI_PRESS_0 in this message to the matching macro number.
        {action_raise_error("BUFFER_SET_MULTI_PRESS_0 COUNT is below min_multi_press_count")}
    {% endif %}

    {% if count > vars.max_multi_press_count|int %}
        # bufferN - Change BUFFER_SET_MULTI_PRESS_0 in this message to the matching macro number.
        {action_raise_error("BUFFER_SET_MULTI_PRESS_0 COUNT exceeds max_multi_press_count")}
    {% endif %}

    # MULTI_PRESS changes how many physical button presses enter continuous mode.
    RUN_SHELL_COMMAND CMD=lll_buffer_cp2112 PARAMS="--addr {vars.addr} multi-press --multi-press-count {count}"


#####################################################################
#                  BufferN Firmware MOVE_DIST
#####################################################################
# Purpose:
# - Move BufferN a bounded distance using firmware MOVE_DIST.
# - Positive distance pushes filament toward the hotend.
# - Negative distance pulls filament toward the spool.
# - This is preferred over modal PUSH/PULL for load/unload macros.
#####################################################################

# bufferN - Change _0 to the target buffer number.
[gcode_macro BUFFER_MOVE_0]
description: Move lll-buffed buffer a bounded distance using firmware MOVE_DIST
gcode:
    # bufferN - Change _LLL_BUFFER_VARS_0 to the matching vars macro.
    {% set vars = printer["gcode_macro _LLL_BUFFER_VARS_0"] %}
    {% set distance = params.DISTANCE|default(0.0)|float %}
    {% set speed = params.SPEED|default(0.0)|float %}
    {% set wait = params.WAIT|default(0)|int %}
    {% set auto = params.AUTO|default(0)|int %}
    {% set read_after = params.READ_AFTER|default(0)|int %}
    {% set max_dist = vars.max_move_distance|float %}

    {% if distance == 0 %}
        # bufferN - Change BUFFER_MOVE_0 in this message to the matching macro number.
        {action_raise_error("BUFFER_MOVE_0 requires DISTANCE")}
    {% endif %}

    {% if distance|abs > max_dist %}
        # bufferN - Change BUFFER_MOVE_0 in this message to the matching macro number.
        {action_raise_error("BUFFER_MOVE_0 DISTANCE exceeds max_move_distance")}
    {% endif %}

    {% if speed < 0 %}
        # bufferN - Change BUFFER_MOVE_0 in this message to the matching macro number.
        {action_raise_error("BUFFER_MOVE_0 SPEED cannot be negative")}
    {% endif %}

    {% if speed > vars.max_speed|float %}
        # bufferN - Change BUFFER_MOVE_0 in this message to the matching macro number.
        {action_raise_error("BUFFER_MOVE_0 SPEED exceeds max_speed")}
    {% endif %}

    {% if speed > 0 %}
        # Optional speed update is handled by the helper before MOVE_DIST.
        {% set speed_arg = "--speed " ~ speed %}
    {% else %}
        # Use currently configured firmware speed.
        {% set speed_arg = "" %}
    {% endif %}

    {% if read_after %}
        # Status reads after motion are optional because immediate reads can affect CP2112/buffer behavior.
        {% set read_arg = "--read-after" %}
    {% else %}
        {% set read_arg = "" %}
    {% endif %}

    # MOVE_DIST is firmware-bounded and does not rely on Python sleep timing.
    RUN_SHELL_COMMAND CMD=lll_buffer_cp2112 PARAMS="--addr {vars.addr} move --distance {distance} {speed_arg} --max-distance {max_dist} --allow-motion {read_arg}"

    {% if wait %}
        {% set wait_speed = speed if speed > 0 else vars.default_speed|float %}
        {% set wait_ms = (((distance|abs / wait_speed) * 1000.0) + vars.move_settle_ms|float)|int %}

        # Optional dwell for macros that need the buffer move complete before continuing.
        G4 P{wait_ms}
    {% endif %}

    {% if auto %}
        # bufferN - Change BUFFER_AUTO_0 to the matching buffer macro.
        BUFFER_AUTO_0
    {% endif %}


#####################################################################
#                  BufferN Modal Forced PUSH
#####################################################################
# Purpose:
# - Manual/debug forced push.
# - This is modal and can run indefinitely.
# - Prefer BUFFER_MOVE_N for normal macros.
#####################################################################

# bufferN - Change _0 to the target buffer number.
[gcode_macro BUFFER_PUSH_0]
description: Manual/debug forced push for lll-buffed buffer
gcode:
    # bufferN - Change _LLL_BUFFER_VARS_0 to the matching vars macro.
    {% set vars = printer["gcode_macro _LLL_BUFFER_VARS_0"] %}
    {% set confirm = params.CONFIRM|default(0)|int %}

    {% if not confirm %}
        # bufferN - Change BUFFER_PUSH_0 in this message to the matching macro number.
        {action_raise_error("BUFFER_PUSH_0 is modal forced motion. Re-run with CONFIRM=1")}
    {% endif %}

    # Forced push ignores hall sensors until AUTO/OFF/MANUAL or another command is sent.
    # Prefer BUFFER_MOVE_N DISTANCE=... for bounded movement.
    RUN_SHELL_COMMAND CMD=lll_buffer_cp2112 PARAMS="--addr {vars.addr} push --allow-motion"


#####################################################################
#                  BufferN Modal Forced PULL
#####################################################################
# Purpose:
# - Manual/debug forced pull.
# - This is modal and can run indefinitely.
# - Prefer BUFFER_MOVE_N for normal macros.
#####################################################################

# bufferN - Change _0 to the target buffer number.
[gcode_macro BUFFER_PULL_0]
description: Manual/debug forced pull for lll-buffed buffer
gcode:
    # bufferN - Change _LLL_BUFFER_VARS_0 to the matching vars macro.
    {% set vars = printer["gcode_macro _LLL_BUFFER_VARS_0"] %}
    {% set confirm = params.CONFIRM|default(0)|int %}

    {% if not confirm %}
        # bufferN - Change BUFFER_PULL_0 in this message to the matching macro number.
        {action_raise_error("BUFFER_PULL_0 is modal forced motion. Re-run with CONFIRM=1")}
    {% endif %}

    # Forced pull ignores hall sensors until AUTO/OFF/MANUAL or another command is sent.
    # Prefer BUFFER_MOVE_N DISTANCE=-... for bounded movement.
    RUN_SHELL_COMMAND CMD=lll_buffer_cp2112 PARAMS="--addr {vars.addr} pull --allow-motion"