#####################################################################
#                  LLL-Buffed Buffer0 via CP2112
#####################################################################
# Purpose:
# - Wrap the Python CP2112 helper in Klipper macro commands.
# - Keep Buffer0 address/config centralized for future multi-buffer expansion.
# - Use firmware MOVE_DIST for bounded movement instead of timed push/pull.
#
# Known behavior:
# - AUTO/REGULAR/NORMAL returns control to native hall-sensor logic.
# - AUTO does not guarantee immediate motion until a hall sensor state changes.
# - MOVE_DIST performs accurate firmware-bounded moves.
# - MOVE_DIST leaves the buffer outside native auto logic until AUTO is sent.
# - PUSH/PULL are modal forced-motion commands and ignore hall sensors while active.
# - OFF/DISABLE momentarily disables motor output, but firmware can re-enable on state changes.
#####################################################################

# bufferX - Change macro number to match the buffer number, example _LLL_BUFFER_VARS_2 for Buffer2.
[gcode_macro _LLL_BUFFER_VARS_0]
description: Shared settings for LLL-Buffed Buffer0 CP2112 control
variable_addr: "0x10"                         # bufferX - Change this to the flashed 7-bit I2C address for this buffer.
variable_default_speed: 45.0
variable_max_speed: 80.0
variable_max_move_distance: 2000.0            # Need to be a 2 meter retract for unload.
variable_move_settle_ms: 250
gcode:
    # Storage macro only.


# bufferX - Change macro number to match the buffer number, example BUFFER_STATUS_2 for Buffer2.
[gcode_macro BUFFER_STATUS_0]
description: Read Buffer0 status through CP2112
gcode:
    {% set vars = printer["gcode_macro _LLL_BUFFER_VARS_0"] %} # bufferX - Change _LLL_BUFFER_VARS_0 to the matching vars macro.

    # Use verbose shell command so status output is visible in console.
    RUN_SHELL_COMMAND CMD=lll_buffer_cp2112_verbose PARAMS="--addr {vars.addr} status"


# bufferX - Change macro number to match the buffer number, example BUFFER_AUTO_2 for Buffer2.
[gcode_macro BUFFER_AUTO_0]
description: Return Buffer0 to native automatic sensor logic
gcode:
    {% set vars = printer["gcode_macro _LLL_BUFFER_VARS_0"] %} # bufferX - Change _LLL_BUFFER_VARS_0 to the matching vars macro.

    # AUTO hands control back to firmware hall-sensor logic.
    # It is not an immediate feed command.
    RUN_SHELL_COMMAND CMD=lll_buffer_cp2112 PARAMS="--addr {vars.addr} auto"


# bufferX - Change macro number to match the buffer number, example BUFFER_NORMAL_2 for Buffer2.
[gcode_macro BUFFER_NORMAL_0]
description: Alias for BUFFER_AUTO_0
gcode:
    BUFFER_AUTO_0                              # bufferX - Change BUFFER_AUTO_0 to the matching auto macro.


# bufferX - Change macro number to match the buffer number, example BUFFER_OFF_2 for Buffer2.
[gcode_macro BUFFER_OFF_0]
description: Momentarily disable Buffer0 motor output
gcode:
    {% set vars = printer["gcode_macro _LLL_BUFFER_VARS_0"] %} # bufferX - Change _LLL_BUFFER_VARS_0 to the matching vars macro.

    # OFF/DISABLE turns off motor output at this moment.
    # Firmware may re-enable motor later if sensor state changes.
    RUN_SHELL_COMMAND CMD=lll_buffer_cp2112 PARAMS="--addr {vars.addr} off"


# bufferX - Change macro number to match the buffer number, example BUFFER_DISABLE_2 for Buffer2.
[gcode_macro BUFFER_DISABLE_0]
description: Alias for BUFFER_OFF_0
gcode:
    BUFFER_OFF_0                               # bufferX - Change BUFFER_OFF_0 to the matching off macro.


# bufferX - Change macro number to match the buffer number, example BUFFER_MANUAL_2 for Buffer2.
[gcode_macro BUFFER_MANUAL_0]
description: Put Buffer0 into manual/hold mode
gcode:
    {% set vars = printer["gcode_macro _LLL_BUFFER_VARS_0"] %} # bufferX - Change _LLL_BUFFER_VARS_0 to the matching vars macro.

    # MANUAL/HOLD ignores normal hall-sensor logic.
    # Do not use this as reliable cleanup after modal PUSH/PULL.
    RUN_SHELL_COMMAND CMD=lll_buffer_cp2112 PARAMS="--addr {vars.addr} manual"


# bufferX - Change macro number to match the buffer number, example BUFFER_HOLD_2 for Buffer2.
[gcode_macro BUFFER_HOLD_0]
description: Alias for BUFFER_MANUAL_0
gcode:
    BUFFER_MANUAL_0                            # bufferX - Change BUFFER_MANUAL_0 to the matching manual macro.


# bufferX - Change macro number to match the buffer number, example BUFFER_SET_SPEED_2 for Buffer2.
[gcode_macro BUFFER_SET_SPEED_0]
description: Set Buffer0 firmware motion speed
gcode:
    {% set vars = printer["gcode_macro _LLL_BUFFER_VARS_0"] %} # bufferX - Change _LLL_BUFFER_VARS_0 to the matching vars macro.
    {% set speed = params.SPEED|default(vars.default_speed)|float %}

    {% if speed <= 0 %}
        {action_raise_error("BUFFER_SET_SPEED_0 SPEED must be greater than 0")} # bufferX - Change BUFFER_SET_SPEED_0 in this message to the matching macro number.
    {% endif %}

    {% if speed > vars.max_speed|float %}
        {action_raise_error("BUFFER_SET_SPEED_0 SPEED exceeds max_speed")} # bufferX - Change BUFFER_SET_SPEED_0 in this message to the matching macro number.
    {% endif %}

    # Speed is configured firmware move speed, not live motor velocity.
    RUN_SHELL_COMMAND CMD=lll_buffer_cp2112 PARAMS="--addr {vars.addr} speed --speed {speed}"


# bufferX - Change macro number to match the buffer number, example BUFFER_MOVE_2 for Buffer2.
[gcode_macro BUFFER_MOVE_0]
description: Move Buffer0 a bounded distance using firmware MOVE_DIST
gcode:
    {% set vars = printer["gcode_macro _LLL_BUFFER_VARS_0"] %} # bufferX - Change _LLL_BUFFER_VARS_0 to the matching vars macro.
    {% set distance = params.DISTANCE|default(0.0)|float %}
    {% set speed = params.SPEED|default(0.0)|float %}
    {% set wait = params.WAIT|default(0)|int %}
    {% set auto = params.AUTO|default(0)|int %}
    {% set read_after = params.READ_AFTER|default(0)|int %}
    {% set max_dist = vars.max_move_distance|float %}

    {% if distance == 0 %}
        {action_raise_error("BUFFER_MOVE_0 requires DISTANCE")} # bufferX - Change BUFFER_MOVE_0 in this message to the matching macro number.
    {% endif %}

    {% if distance|abs > max_dist %}
        {action_raise_error("BUFFER_MOVE_0 DISTANCE exceeds max_move_distance")} # bufferX - Change BUFFER_MOVE_0 in this message to the matching macro number.
    {% endif %}

    {% if speed < 0 %}
        {action_raise_error("BUFFER_MOVE_0 SPEED cannot be negative")} # bufferX - Change BUFFER_MOVE_0 in this message to the matching macro number.
    {% endif %}

    {% if speed > vars.max_speed|float %}
        {action_raise_error("BUFFER_MOVE_0 SPEED exceeds max_speed")} # bufferX - Change BUFFER_MOVE_0 in this message to the matching macro number.
    {% endif %}

    {% if speed > 0 %}
        # Optional speed update is handled by the helper before MOVE_DIST.
        {% set speed_arg = "--speed " ~ speed %}
    {% else %}
        # Use currently configured firmware speed.
        {% set speed_arg = "" %}
    {% endif %}

    {% if read_after %}
        {% set read_arg = "--read-after" %}
    {% else %}
        {% set read_arg = "" %}
    {% endif %}

    # MOVE_DIST is firmware-bounded and does not rely on Python sleep timing.
    RUN_SHELL_COMMAND CMD=lll_buffer_cp2112 PARAMS="--addr {vars.addr} move --distance {distance} {speed_arg} --max-distance {max_dist} --allow-motion {read_arg}"

    {% if wait %}
        {% set wait_speed = speed if speed > 0 else vars.default_speed|float %}
        {% set wait_ms = (((distance|abs / wait_speed) * 1000.0) + vars.move_settle_ms|float)|int %}

        # Optional dwell for macros that need the buffer move complete before continuing.
        G4 P{wait_ms}
    {% endif %}

    {% if auto %}
        # Only return to native logic when intentionally requested.
        BUFFER_AUTO_0                         # bufferX - Change BUFFER_AUTO_0 to the matching auto macro.
    {% endif %}


# bufferX - Change macro number to match the buffer number, example BUFFER_PUSH_2 for Buffer2.
[gcode_macro BUFFER_PUSH_0]
description: Manual/debug forced push for Buffer0
gcode:
    {% set vars = printer["gcode_macro _LLL_BUFFER_VARS_0"] %} # bufferX - Change _LLL_BUFFER_VARS_0 to the matching vars macro.
    {% set confirm = params.CONFIRM|default(0)|int %}

    {% if not confirm %}
        {action_raise_error("BUFFER_PUSH_0 is modal forced motion. Re-run with CONFIRM=1")} # bufferX - Change BUFFER_PUSH_0 in this message to the matching macro number.
    {% endif %}

    # Forced push ignores hall sensors until AUTO/OFF/MANUAL or another command is sent.
    # Prefer BUFFER_MOVE_0 DISTANCE=... for bounded movement. # bufferX - Change BUFFER_MOVE_0 to the matching move macro.
    RUN_SHELL_COMMAND CMD=lll_buffer_cp2112 PARAMS="--addr {vars.addr} push --allow-motion"


# bufferX - Change macro number to match the buffer number, example BUFFER_PULL_2 for Buffer2.
[gcode_macro BUFFER_PULL_0]
description: Manual/debug forced pull for Buffer0
gcode:
    {% set vars = printer["gcode_macro _LLL_BUFFER_VARS_0"] %} # bufferX - Change _LLL_BUFFER_VARS_0 to the matching vars macro.
    {% set confirm = params.CONFIRM|default(0)|int %}

    {% if not confirm %}
        {action_raise_error("BUFFER_PULL_0 is modal forced motion. Re-run with CONFIRM=1")} # bufferX - Change BUFFER_PULL_0 in this message to the matching macro number.
    {% endif %}

    # Forced pull ignores hall sensors until AUTO/OFF/MANUAL or another command is sent.
    # Prefer BUFFER_MOVE_0 DISTANCE=-... for bounded movement. # bufferX - Change BUFFER_MOVE_0 to the matching move macro.
    RUN_SHELL_COMMAND CMD=lll_buffer_cp2112 PARAMS="--addr {vars.addr} pull --allow-motion"