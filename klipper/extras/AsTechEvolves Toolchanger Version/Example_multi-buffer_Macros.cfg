#####################################################################
#   LLL-Buffed CP2112 Buffer Routing / Usage Examples
#####################################################################
# Purpose:
# - Central map for installed buffers and tool-to-buffer pairing.
# - Route active-tool buffer actions through numbered buffer wrapper macros.
# - Provide all-buffer AUTO/OFF/default helpers.
# - Provide quiet comms checks that only report failures unless VERBOSE=1.
#
# Required external dependencies:
# - Each installed buffer must have matching numbered wrapper macros loaded:
#     BUFFER_AUTO_0, BUFFER_OFF_0, BUFFER_MOVE_0, BUFFER_STATUS_0,
#     BUFFER_APPLY_DEFAULTS_0, etc.
#
# - BUFFER_CHECK_COMMS requires this shell command and Python helper:
#     /home/<home-dir>/printer_data/config/helpers/lll_buffer_check.py
#
# - The Python helper should very little on success and print a clear
#   BUFFER COMMS ERROR on failure.
#####################################################################


#####################################################################
#   Required shell command for BUFFER_CHECK_COMMS
#####################################################################

[gcode_shell_command lll_buffer_cp2112_check]
command: /home/<home-dir>/klippy-env/bin/python /home/<home-dir>/printer_data/config/helpers/lll_buffer_check.py
timeout: 15.0
verbose: True


#####################################################################
#   Macro Message Control
#####################################################################

[gcode_macro _MACRO_MESSAGES]
description: Shared message controls for buffer router macros
variable_status_enabled: 0                    # 1 = show basic progress messages.
variable_debug: 1                             # 1 = show detailed debug messages.
gcode:
    # Variable storage only.


[gcode_macro _STATUS_MSG]
description: Print a basic user-facing macro status message
gcode:
    {% set msg = params.MSG|default("")|string %}
    {% set vars = printer["gcode_macro _MACRO_MESSAGES"] %}

    {% if vars.status_enabled|int == 1 and msg != "" %}
        M118 {msg}
    {% endif %}


[gcode_macro _DEBUG_MSG]
description: Print a detailed debug message when macro debug is enabled
gcode:
    {% set msg = params.MSG|default("")|string %}
    {% set vars = printer["gcode_macro _MACRO_MESSAGES"] %}

    {% if vars.debug|int == 1 and msg != "" %}
        M118 DEBUG: {msg}
    {% endif %}


#####################################################################
#   Buffer / Tool Map
#####################################################################
# Purpose:
# - Central map for installed buffers and tool-to-buffer pairing.
# - LLL-buffed firmware owns buffer entrance/hall behavior.
# - Klipper routes active-tool buffer actions to the correct CP2112 wrapper.
#
# Mapping flow:
# - active extruder object -> tool number
# - tool number -> mapped buffer number
# - buffer number -> BUFFER_*_N wrapper macro
#
# I2C address note:
# - Do not build I2C addresses here.
# - Each bufferN.cfg owns its own address in _LLL_BUFFER_VARS_N.
#####################################################################

[gcode_macro _BUFFER_USAGE_STATE]
description: Central buffer/tool map

variable_installed_buffers: "0,1,2,3,4"       # Installed buffer numbers.

variable_tool0_buffer: 0
variable_tool1_buffer: 1
variable_tool2_buffer: 2
variable_tool3_buffer: 3
variable_tool4_buffer: 4

# Use the full Klipper object name for each toolhead/nozzle sensor.
# These are useful for hotend-side load/unload and print-start decisions.
variable_tool0_hotend_sensor: "filament_switch_sensor T0_filament_sensor"
variable_tool1_hotend_sensor: "filament_switch_sensor T1_filament_sensor"
variable_tool2_hotend_sensor: "filament_switch_sensor T2_filament_sensor"
variable_tool3_hotend_sensor: "" # "filament_switch_sensor T3_filament_sensor"
variable_tool4_hotend_sensor: "" # "filament_switch_sensor T4_filament_sensor"

gcode:
    # Central map only.


#####################################################################
#   Active Tool Buffer Router
#####################################################################
# Purpose:
# - Route active-tool buffer actions through the mapped CP2112/I2C wrappers.
# - Tool0 / extruder  -> mapped buffer from variable_tool0_buffer
# - Tool1 / extruder1 -> mapped buffer from variable_tool1_buffer
#
# Assumption:
# - T0 selects [extruder].
# - T1 selects [extruder1].
# - T2 selects [extruder2].
# - T3 selects [extruder3].
# - T4 selects [extruder4].
#
# Required numbered wrappers:
# - BUFFER_AUTO_N
# - BUFFER_OFF_N
# - BUFFER_MOVE_N
# - BUFFER_STATUS_N
# - BUFFER_APPLY_DEFAULTS_N
#####################################################################

[gcode_macro _ACTIVE_BUFFER_NUMBER]
description: Debug helper showing which buffer is mapped to the active tool
gcode:
    {% set map = printer["gcode_macro _BUFFER_USAGE_STATE"] %}
    {% set active_extruder = printer.toolhead.extruder|string %}

    {% if active_extruder == "extruder" %}
        {% set buffer = map.tool0_buffer|int %}
    {% elif active_extruder == "extruder1" %}
        {% set buffer = map.tool1_buffer|int %}
    {% elif active_extruder == "extruder2" %}
        {% set buffer = map.tool2_buffer|int %}
    {% elif active_extruder == "extruder3" %}
        {% set buffer = map.tool3_buffer|int %}
    {% elif active_extruder == "extruder4" %}
        {% set buffer = map.tool4_buffer|int %}
    {% else %}
        {% set buffer = -1 %}
    {% endif %}

    M118 Active extruder {active_extruder} maps to Buffer{buffer}


[gcode_macro BUFFER_ARM_ACTIVE_TOOL]
description: Return the buffer paired to the currently active tool to native auto logic
gcode:
    {% set map = printer["gcode_macro _BUFFER_USAGE_STATE"] %}
    {% set active_extruder = printer.toolhead.extruder|string %}
    {% set direct_feed = params.DIRECT_FEED|default(0)|int %}

    {% if active_extruder == "extruder" %}
        {% set buffer = map.tool0_buffer|int %}
    {% elif active_extruder == "extruder1" %}
        {% set buffer = map.tool1_buffer|int %}
    {% elif active_extruder == "extruder2" %}
        {% set buffer = map.tool2_buffer|int %}
    {% elif active_extruder == "extruder3" %}
        {% set buffer = map.tool3_buffer|int %}
    {% elif active_extruder == "extruder4" %}
        {% set buffer = map.tool4_buffer|int %}
    {% else %}
        {% set buffer = -1 %}
    {% endif %}

    {% if direct_feed %}
        _STATUS_MSG MSG="Buffer skipped - DIRECT_FEED=1"
        _DEBUG_MSG MSG="BUFFER_ARM_ACTIVE_TOOL: skipped by DIRECT_FEED=1"
        BUFFER_DISABLE_ACTIVE_TOOL DISABLE_MOTOR=1

    {% elif buffer >= 0 %}
        _DEBUG_MSG MSG="BUFFER_ARM_ACTIVE_TOOL: active_extruder={active_extruder} -> Buffer{buffer} AUTO"

        # Quietly verify the mapped buffer can be reached before handing it to AUTO.
        BUFFER_CHECK_COMMS BUFFER={buffer}

        # This emits BUFFER_AUTO_0, BUFFER_AUTO_1, etc.
        # The matching bufferN.cfg owns the actual I2C address.
        BUFFER_AUTO_{buffer}

    {% else %}
        M118 No CP2112 buffer arm route for active extruder: {active_extruder}
    {% endif %}


[gcode_macro BUFFER_DISABLE_ACTIVE_TOOL]
description: Disable or release the buffer paired to the current active tool
gcode:
    {% set map = printer["gcode_macro _BUFFER_USAGE_STATE"] %}
    {% set active_extruder = printer.toolhead.extruder|string %}
    {% set disable_motor = params.DISABLE_MOTOR|default(1)|int %}

    {% if active_extruder == "extruder" %}
        {% set buffer = map.tool0_buffer|int %}
    {% elif active_extruder == "extruder1" %}
        {% set buffer = map.tool1_buffer|int %}
    {% elif active_extruder == "extruder2" %}
        {% set buffer = map.tool2_buffer|int %}
    {% elif active_extruder == "extruder3" %}
        {% set buffer = map.tool3_buffer|int %}
    {% elif active_extruder == "extruder4" %}
        {% set buffer = map.tool4_buffer|int %}
    {% else %}
        {% set buffer = -1 %}
    {% endif %}

    {% if buffer >= 0 %}
        _DEBUG_MSG MSG="BUFFER_DISABLE_ACTIVE_TOOL: active_extruder={active_extruder} -> Buffer{buffer}, disable_motor={disable_motor}"

        # Quietly verify the mapped buffer can be reached before changing state.
        BUFFER_CHECK_COMMS BUFFER={buffer}

        {% if disable_motor %}
            # This emits BUFFER_OFF_0, BUFFER_OFF_1, etc.
            BUFFER_OFF_{buffer}
        {% else %}
            # This emits BUFFER_AUTO_0, BUFFER_AUTO_1, etc.
            BUFFER_AUTO_{buffer}
        {% endif %}

    {% else %}
        M118 No CP2112 buffer disable route for active extruder: {active_extruder}
    {% endif %}


[gcode_macro BUFFER_AUTO_ALL_BUFFERS]
description: Return all installed CP2112/lll-buffed buffers to native AUTO logic
gcode:
    # Uses installed_buffers from _BUFFER_USAGE_STATE.
    # DISABLE_MOTOR=0 makes BUFFER_DISABLE_ALL_BUFFERS route to BUFFER_AUTO_N.
    BUFFER_DISABLE_ALL_BUFFERS DISABLE_MOTOR=0


[gcode_macro BUFFER_DISABLE_ALL_BUFFERS]
description: Disable all installed CP2112/lll-buffed buffers
gcode:
    {% set disable_motor = params.DISABLE_MOTOR|default(1)|int %}
    {% set map = printer["gcode_macro _BUFFER_USAGE_STATE"] %}
    {% set installed = map.installed_buffers|string %}

    _DEBUG_MSG MSG="BUFFER_DISABLE_ALL_BUFFERS: disable_motor={disable_motor}, installed_buffers={installed}"

    {% for b in installed.split(",") %}
        {% set n = b|trim %}

        {% if n != "" %}
            # Quietly verify this buffer can be reached before changing state.
            BUFFER_CHECK_COMMS BUFFER={n}

            {% if disable_motor %}
                # This emits BUFFER_OFF_0, BUFFER_OFF_1, etc.
                BUFFER_OFF_{n}
            {% else %}
                # This emits BUFFER_AUTO_0, BUFFER_AUTO_1, etc.
                BUFFER_AUTO_{n}
            {% endif %}
        {% endif %}
    {% endfor %}


[gcode_macro _BUFFER_APPLY_DEFAULTS_ALL_BUFFERS]
description: Apply configured defaults from each numbered buffer file to all installed buffers
gcode:
    {% set map = printer["gcode_macro _BUFFER_USAGE_STATE"] %}
    {% set installed = map.installed_buffers|string %}

    _DEBUG_MSG MSG="BUFFER_APPLY_DEFAULTS_ALL_BUFFERS: installed_buffers={installed}"

    {% for b in installed.split(",") %}
        {% set n = b|trim %}

        {% if n != "" %}
            _DEBUG_MSG MSG="BUFFER_APPLY_DEFAULTS_ALL_BUFFERS: applying BUFFER_APPLY_DEFAULTS_{n}"

            # Quietly verify this buffer can be reached before applying RAM defaults.
            BUFFER_CHECK_COMMS BUFFER={n}

            # This emits BUFFER_APPLY_DEFAULTS_0, BUFFER_APPLY_DEFAULTS_1, etc.
            # Each numbered buffer file owns its own configured defaults.
            BUFFER_APPLY_DEFAULTS_{n}
        {% endif %}
    {% endfor %}


[gcode_macro BUFFER_MOVE_ACTIVE_TOOL]
description: Move active tool buffer using firmware MOVE_DIST
gcode:
    {% set map = printer["gcode_macro _BUFFER_USAGE_STATE"] %}
    {% set active_extruder = printer.toolhead.extruder|string %}
    {% set distance = params.DISTANCE|default(0.0)|float %}
    {% set speed = params.SPEED|default(0.0)|float %}
    {% set wait = params.WAIT|default(0)|int %}
    {% set auto = params.AUTO|default(0)|int %}
    {% set read_after = params.READ_AFTER|default(0)|int %}

    {% if active_extruder == "extruder" %}
        {% set buffer = map.tool0_buffer|int %}
    {% elif active_extruder == "extruder1" %}
        {% set buffer = map.tool1_buffer|int %}
    {% elif active_extruder == "extruder2" %}
        {% set buffer = map.tool2_buffer|int %}
    {% elif active_extruder == "extruder3" %}
        {% set buffer = map.tool3_buffer|int %}
    {% elif active_extruder == "extruder4" %}
        {% set buffer = map.tool4_buffer|int %}
    {% else %}
        {% set buffer = -1 %}
    {% endif %}

    {% if buffer >= 0 %}
        _DEBUG_MSG MSG="BUFFER_MOVE_ACTIVE_TOOL: active_extruder={active_extruder} -> Buffer{buffer}, DISTANCE={distance}, SPEED={speed}, WAIT={wait}, AUTO={auto}, READ_AFTER={read_after}"

        # Quietly verify the mapped buffer can be reached before commanding motion.
        BUFFER_CHECK_COMMS BUFFER={buffer}

        # This emits BUFFER_MOVE_0, BUFFER_MOVE_1, etc.
        BUFFER_MOVE_{buffer} DISTANCE={distance} SPEED={speed} WAIT={wait} AUTO={auto} READ_AFTER={read_after}

    {% else %}
        M118 No CP2112 buffer move route for active extruder: {active_extruder}
    {% endif %}


[gcode_macro BUFFER_STATUS_ACTIVE_TOOL]
description: Read status from the buffer paired to the active tool
gcode:
    {% set map = printer["gcode_macro _BUFFER_USAGE_STATE"] %}
    {% set active_extruder = printer.toolhead.extruder|string %}

    {% if active_extruder == "extruder" %}
        {% set buffer = map.tool0_buffer|int %}
    {% elif active_extruder == "extruder1" %}
        {% set buffer = map.tool1_buffer|int %}
    {% elif active_extruder == "extruder2" %}
        {% set buffer = map.tool2_buffer|int %}
    {% elif active_extruder == "extruder3" %}
        {% set buffer = map.tool3_buffer|int %}
    {% elif active_extruder == "extruder4" %}
        {% set buffer = map.tool4_buffer|int %}
    {% else %}
        {% set buffer = -1 %}
    {% endif %}

    {% if buffer >= 0 %}
        # This emits BUFFER_STATUS_0, BUFFER_STATUS_1, etc.
        BUFFER_STATUS_{buffer}
    {% else %}
        M118 No CP2112 buffer status route for active extruder: {active_extruder}
    {% endif %}


#####################################################################
#   LLL Buffer CP2112 Comms Check
#####################################################################

[gcode_macro BUFFER_CHECK_COMMS]
description: Quietly verify one or all LLL buffers respond with healthy CP2112 status
variable_default_target: "all"
variable_between_checks_ms: 100
variable_default_verbose: 0
gcode:
    {% set map = printer["gcode_macro _BUFFER_USAGE_STATE"] %}

    # Accept BUFFER=2, BUFFERS=2, BUFFER=0,2,4, or no parameter for all buffers.
    {% if params.BUFFER is defined %}
        {% set requested_raw = params.BUFFER|string %}
    {% elif params.BUFFERS is defined %}
        {% set requested_raw = params.BUFFERS|string %}
    {% else %}
        {% set requested_raw = default_target|string %}
    {% endif %}

    # VERBOSE=1 makes the check visible for testing. Default is silent success.
    {% set verbose = params.VERBOSE|default(default_verbose)|int %}

    # Pull configured buffer IDs from the central buffer map so the installed list
    # has one source of truth.
    {% set installed = map.installed_buffers|string %}
    {% set requested = (requested_raw|lower|replace(" ", "")) %}
    {% set configured_buffers = (installed|replace(" ", "")).split(",") %}

    # Default behavior checks every buffer listed in _BUFFER_USAGE_STATE.
    {% if requested in ["all", "*", ""] %}
        {% set selected_buffers = configured_buffers %}
    {% else %}
        {% set selected_buffers = requested.split(",") %}
    {% endif %}

    {% if verbose %}
        RESPOND TYPE=command MSG="Checking LLL buffer comms: {selected_buffers|join(',')}"
    {% endif %}

    {% for buffer_index in selected_buffers %}
        # Prevent quiet typos like BUFFER=5 when only 0-4 are configured.
        {% if buffer_index not in configured_buffers %}
            {action_raise_error("BUFFER_CHECK_COMMS invalid buffer index '" ~ buffer_index ~ "'. Configured buffers: " ~ installed)}
        {% endif %}

        # Pull the I2C address from the matching _LLL_BUFFER_VARS_x macro.
        {% set vars_macro = "gcode_macro _LLL_BUFFER_VARS_" ~ buffer_index %}
        {% set vars = printer[vars_macro] %}

        {% if verbose %}
            RESPOND TYPE=command MSG="Checking Buffer{buffer_index} comms at addr {vars.addr}"
            {% set verbose_arg = "--verbose" %}
        {% else %}
            {% set verbose_arg = "" %}
        {% endif %}

        # Python helper prints minimal output on success.
        # On failure it prints a loud BUFFER COMMS ERROR and exits non-zero.
        RUN_SHELL_COMMAND CMD=lll_buffer_cp2112_check PARAMS="--name Buffer{buffer_index} --addr {vars.addr} {verbose_arg}"

        # Small gap keeps CP2112/I2C checks from hammering the bridge back-to-back.
        {% if not loop.last %}
            G4 P{between_checks_ms|int}
        {% endif %}
    {% endfor %}

    {% if verbose %}
        RESPOND TYPE=command MSG="LLL buffer comms check complete"
    {% endif %}


#####################################################################
#   Optional startup example
#####################################################################
# This is optional. Use only if you want Klipper to initialize the
# toolchanger and apply buffer RAM defaults shortly after startup.
#####################################################################

# [delayed_gcode _BOOT_INIT_TOOLCHANGER]
# initial_duration: 5
# gcode:
#     INITIALIZE_TOOLCHANGER
#     _BUFFER_APPLY_DEFAULTS_ALL_BUFFERS


#####################################################################
#   Example calls
#####################################################################

# Show which buffer the current active extruder maps to:
#   _ACTIVE_BUFFER_NUMBER

# Put the active tool's mapped buffer into native AUTO / REGULAR mode:
#   BUFFER_ARM_ACTIVE_TOOL

# Skip buffer automation for a direct-feed test:
#   BUFFER_ARM_ACTIVE_TOOL DIRECT_FEED=1

# Disable the active tool's mapped buffer motor:
#   BUFFER_DISABLE_ACTIVE_TOOL DISABLE_MOTOR=1

# Return the active tool's mapped buffer to AUTO instead of disabling motor:
#   BUFFER_DISABLE_ACTIVE_TOOL DISABLE_MOTOR=0

# Return every installed buffer to AUTO / REGULAR:
#   BUFFER_AUTO_ALL_BUFFERS

# Disable every installed buffer motor:
#   BUFFER_DISABLE_ALL_BUFFERS DISABLE_MOTOR=1

# Apply each bufferN.cfg default settings to all installed buffers:
#   _BUFFER_APPLY_DEFAULTS_ALL_BUFFERS

# Move the active tool's mapped buffer using firmware MOVE_DIST:
#   BUFFER_MOVE_ACTIVE_TOOL DISTANCE=100 SPEED=45 WAIT=1 AUTO=1

# Move the active tool's mapped buffer without waiting:
#   BUFFER_MOVE_ACTIVE_TOOL DISTANCE=50 SPEED=45 WAIT=0 AUTO=0

# Read verbose status from the active tool's mapped buffer:
#   BUFFER_STATUS_ACTIVE_TOOL

# Quiet comms check for all installed buffers:
#   BUFFER_CHECK_COMMS

# Visible comms check for all installed buffers:
#   BUFFER_CHECK_COMMS VERBOSE=1

# Quiet comms check for one buffer:
#   BUFFER_CHECK_COMMS BUFFER=2

# Quiet comms check for selected buffers:
#   BUFFER_CHECK_COMMS BUFFER=0,3,4